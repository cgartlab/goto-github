# GoToGitHub CI — shellcheck on push/PR
name: Lint

on:
  push:
    branches: [main, dev-*]
    paths:
      - 'fetch.sh'
      - 'scripts/**/*.sh'
  pull_request:
    branches: [main]
    paths:
      - 'fetch.sh'
      - 'scripts/**/*.sh'

permissions:
  contents: read

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@master
        with:
          severity: warning
          additional_files: fetch.sh